<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header con Menú Desplegable y Transición</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #333;
            padding: 10px 0;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 50px;
            position: relative;
        }
        nav .menu {
            position: relative;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 10px;
            display: inline-block;
        }
        nav a:hover {
            background-color: #555;
            cursor: pointer;
        }
        .submenu {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #444;
            min-width: 150px;
            padding: 10px 0;
            opacity: 0; /* Inicialmente oculto */
            visibility: hidden;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease; /* Transición suave */
        }
        .submenu a {
            display: block;
            padding: 8px 12px;
            color: white;
            text-decoration: none;
        }
        .submenu a:hover {
            background-color: #666;
        }
        .menu:hover .submenu {
            opacity: 1;
            visibility: visible;
        }

        #header-menu-logo{
            margin-right: 220px;
            height: 50px;
            width: auto;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="menu">
            <a href="#"><img src="img/logo_viejo.png" id="header-menu-logo"></img></a>
        </div>
        <div class="menu">
            <a href="#">Servicios</a>
            <div class="submenu">
                <a href="#">Institucional</a>
            </div>
        </div>
        <div class="menu">
            <a href="#">Prensa</a>
            <div class="submenu">
                <a href="#">Normativa</a>
            </div>
        </div>
        <div class="menu">
            <a href="#">Links</a>
            <div class="submenu">
                <a href="#">Subitem 1</a>
            </div>
        </div>
        <div class="menu">
            <a href="#">Contactos</a>
            <div class="submenu">
                <a href="#">Sub</a>
            </div>
        </div>
    </nav>
    </header>
</body>
</html>
