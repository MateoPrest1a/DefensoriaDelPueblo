<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defensoría - SPA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #6FB1FC; /* Azul celeste atlántico */

    }

    .navbar-logo img {
      height: 100px;

    }

    .navbar-menu {
      display: flex;
      gap: 20px;
    }

    .navbar-menu a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    .navbar-menu a:hover {
      color: #ccc;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">
      <img src="logo_viejo.png" alt="Logo Defensoría" />
    </div>
    <div class="navbar-menu">
      <a href="#">Institucional</a>
      <a href="#">Prensa</a>
      <a href="#">Normativa</a>
      <a href="#">Links</a>
      <a href="#">Contáctenos</a>
    </div>
  </nav>

</body>
</html>
